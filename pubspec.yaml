name: untitled
description: "A new Flutter project."
publish_to: 'none'

version: 0.1.1+4

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations: # Added
    sdk: flutter
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  google_sign_in: ^6.2.0
  just_audio: ^0.10.5
  flutter_svg: ^2.0.9
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  provider: ^6.0.5
  shared_preferences: ^2.5.5
  flutter_quill: ^11.5.0
  volume_controller: ^2.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6
  flutter_launcher_icons: ^0.14.4
  rename: ^3.0.0

flutter_launcher_icons:
  android: true
  image_path: "assets/img/icon.png"

flutter:
  generate: true # Added for localization
  uses-material-design: true
  fonts:
    - family: ZenKakuGothicNew
      fonts:
        - asset: assets/fonts/ZenKakuGothicNew-Regular.ttf
          weight: 400
        - asset: assets/fonts/ZenKakuGothicNew-Bold.ttf
          weight: 700

  assets:
    - assets/fonts/
    - assets/img/
    - assets/music/
