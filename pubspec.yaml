name: untitled
description: "A new Flutter project."
publish_to: 'none'

version: 0.1.1+4

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations: # Added
    sdk: flutter
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  uuid: ^4.5.1
  google_sign_in: ^6.2.0
  just_audio: ^0.10.5
  audio_service: ^0.18.15
  permission_handler: ^11.3.1
  flutter_svg: ^2.0.9
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  provider: ^6.0.5
  shared_preferences: ^2.5.5
  flutter_quill: ^11.5.0
  volume_controller: ^2.0.6
  hive: ^2.2.3
  flutter_foreground_task: ^8.14.0
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.5
  rename: ^3.0.0

flutter_launcher_icons:
  android: true
  image_path: "assets/img/icon_app.png"

flutter_native_splash:
  # Цвет фона — кремовый, как в теме приложения
  color: "#F5F0E8"
  # Иконка по центру
  image: assets/img/icon_app.png
  # Android 12+ имеет свой Splash API
  android_12:
    image: assets/img/icon_app.png
    icon_background_color: "#F5F0E8"
    image_dark: assets/img/icon_app.png
    icon_background_color_dark: "#F5F0E8"
  # Тёмная тема — тот же цвет
  color_dark: "#F5F0E8"
  image_dark: assets/img/icon_app.png

flutter:
  generate: true # Added for localization
  uses-material-design: true
  fonts:
    - family: Fredoka
      fonts:
        - asset: assets/fonts/Fredoka/Fredoka-Light.ttf
          weight: 300
        - asset: assets/fonts/Fredoka/Fredoka-Regular.ttf
          weight: 400
        - asset: assets/fonts/Fredoka/Fredoka-Medium.ttf
          weight: 500
        - asset: assets/fonts/Fredoka/Fredoka-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Fredoka/Fredoka-Bold.ttf
          weight: 700

    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito/Nunito-Light.ttf
          weight: 300
        - asset: assets/fonts/Nunito/Nunito-Regular.ttf
          weight: 400
        - asset: assets/fonts/Nunito/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito/Nunito-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Nunito/Nunito-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/Nunito/Nunito-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Nunito/Nunito-BoldItalic.ttf
          weight: 700
          style: italic

    - family: Comfortaa
      fonts:
        - asset: assets/fonts/Comfortaa/Comfortaa-Light.ttf
          weight: 300
        - asset: assets/fonts/Comfortaa/Comfortaa-Regular.ttf
          weight: 400
        - asset: assets/fonts/Comfortaa/Comfortaa-Medium.ttf
          weight: 500
        - asset: assets/fonts/Comfortaa/Comfortaa-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Comfortaa/Comfortaa-Bold.ttf
          weight: 700

    - family: ZenKakuGothicNew
      fonts:
        - asset: assets/fonts/ZenKaku/ZenKakuGothicNew-Regular.ttf
          weight: 400
        - asset: assets/fonts/ZenKaku/ZenKakuGothicNew-Bold.ttf
          weight: 700

  assets:
    - assets/fonts/
    - assets/fonts/Fredoka/
    - assets/fonts/Nunito/
    - assets/fonts/Comfortaa/
    - assets/fonts/ZenKaku/
    - assets/img/
    - assets/music/
